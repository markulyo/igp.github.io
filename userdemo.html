<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: auto; }
        h1, h2 { color: #333; }
        form { background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        form div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: calc(100% - 22px);
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button.update { background-color: #008CBA; }
        button.delete { background-color: #f44336; }
        button:hover { opacity: 0.9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>User Management Dashboard</h1>

        <!-- User Creation/Update Form -->
        <form id="userForm">
            <h2>Add New User</h2>
            <div>
                <label for="userId">User ID (for update, leave blank for new):</label>
                <input type="text" id="userId" placeholder="Optional for update">
            </div>
            <div>
                <label for="userName">Name:</label>
                <input type="text" id="userName" required>
            </div>
            <div>
                <label for="userEmail">Email:</label>
                <input type="email" id="userEmail" required>
            </div>
            <div>
                <label for="userPassword">Password (for new user):</label>
                <input type="password" id="userPassword" placeholder="Required for new user">
            </div>
            <button type="submit" id="submitUserBtn">Add User</button>
            <button type="button" id="clearFormBtn" style="background-color: #6c757d;">Clear Form</button>
        </form>

        <!-- User List/Read Section -->
        <section>
            <h2>Existing Users</h2>
            <table id="userTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- User data will be inserted here by JavaScript -->
                    <tr>
                        <td>1</td>
                        <td>John Doe</td>
                        <td>john.doe@example.com</td>
                        <td>
                            <button class="update" data-id="1">Edit</button>
                            <button class="delete" data-id="1">Delete</button>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Jane Smith</td>
                        <td>jane.smith@example.com</td>
                        <td>
                            <button class="update" data-id="2">Edit</button>
                            <button class="delete" data-id="2">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>

    <script>

        document.addEventListener('DOMContentLoaded', () => {
            const userForm = document.getElementById('userForm');
            const submitUserBtn = document.getElementById('submitUserBtn');
            const clearFormBtn = document.getElementById('clearFormBtn');
            const userTableBody = document.querySelector('#userTable tbody');

            // Example: Handling form submission
            userForm.addEventListener('submit', (event) => {
                event.preventDefault();
                const userId = document.getElementById('userId').value;
                const userName = document.getElementById('userName').value;
                const userEmail = document.getElementById('userEmail').value;
                const userPassword = document.getElementById('userPassword').value;

                if (userId) {
                    console.log('Updating user:', { id: userId, name: userName, email: userEmail });
                    // Call your Firebase update function here
                } else {
                    console.log('Adding new user:', { name: userName, email: userEmail, password: userPassword });
                    // Call your Firebase add user function here (e.g., using Firebase Authentication and Firestore/Realtime Database)
                }
                // After successful operation, clear form and refresh user list
                userForm.reset();
                submitUserBtn.textContent = 'Add User';
            });

            // Example: Clearing the form
            clearFormBtn.addEventListener('click', () => {
                userForm.reset();
                submitUserBtn.textContent = 'Add User';
                document.getElementById('userId').value = ''; // Ensure ID is cleared
            });

            // Example: Handling edit/delete buttons (delegation)
            userTableBody.addEventListener('click', (event) => {
                const target = event.target;
                if (target.classList.contains('update')) {
                    const id = target.dataset.id;
                    console.log('Edit user with ID:', id);

                    // document.getElementById('userName').value = userToEdit.name;
                    // document.getElementById('userEmail').value = userToEdit.email;
                    // submitUserBtn.textContent = 'Update User';
                } else if (target.classList.contains('delete')) {
                    const id = target.dataset.id;
                    if (confirm(`Are you sure you want to delete user with ID: ${id}?`)) {
                        console.log('Delete user with ID:', id);
                        // Call your Firebase delete function here
                    }
                }
            });

            // Function to load users from Firebase and populate the table
            function loadUsers() {
                // This is where you would fetch data from Firebase Firestore or Realtime Database
                // Clear existing rows

                // Loop through Firebase data and append rows to userTableBody
                // Example:
                // const users = [{ id: 'firebase-id-1', name: 'Alice', email: 'alice@example.com' }];
                // users.forEach(user => {
                //     const row = userTableBody.insertRow();
                //     row.insertCell(0).textContent = user.id;
                //     row.insertCell(1).textContent = user.name;
                //     row.insertCell(2).textContent = user.email;
                //     const actionsCell = row.insertCell(3);
                //     actionsCell.innerHTML = `
                //         <button class="update" data-id="${user.id}">Edit</button>
                //         <button class="delete" data-id="${user.id}">Delete</button>
                //     `;
                // });
            }

            // Initial load of users (you'd call this after Firebase initialization)
            loadUsers();
        });
    </script>
</body>
</html>
