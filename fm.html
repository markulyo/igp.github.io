<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Firebase Users & Roles Manager</title>
  <style>
    :root { font-family: "DM Sans", system-ui, -apple-system, sans-serif; background: #f6f7fb; color: #0f172a; }
    body { margin: 0; }
    .wrap { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .subtitle { margin: 0 0 20px; color: #475569; }
    .auth-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #e2e8f0; flex-wrap: wrap; gap: 16px; }
    .auth-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #dbeafe; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #1e40af; font-size: 18px; }
    .user-email { font-weight: 600; color: #0f172a; font-size: 14px; margin: 0; }
    .user-role { font-size: 12px; color: #64748b; margin: 4px 0 0 0; }
    .user-role span { font-weight: 600; color: #1e40af; background: #eff6ff; padding: 2px 8px; border-radius: 4px; }
    .auth-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 2px solid #e2e8f0; }
    .tab-btn { padding: 12px 20px; background: transparent; border: none; border-bottom: 3px solid transparent; color: #475569; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s; }
    .tab-btn.active { color: #0f172a; border-bottom-color: #0f172a; }
    .tab-btn:hover { color: #1e293b; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 8px 30px rgba(15, 23, 42, 0.06); padding: 24px; margin-bottom: 24px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .card-title { font-size: 18px; font-weight: 600; color: #1e293b; }
    #status, #roleStatus { font-weight: 600; color: #0f172a; padding: 8px 12px; border-radius: 6px; background: #f1f5f9; }
    #status.success, #roleStatus.success { background: #d1fae5; color: #065f46; }
    #status.error, #roleStatus.error { background: #fee2e2; color: #7f1d1d; }
    button { border: 1px solid #0f172a; background: #0f172a; color: #fff; border-radius: 8px; padding: 8px 14px; font-weight: 600; cursor: pointer; font-size: 13px; }
    button:hover { background: #111827; }
    button.secondary { background: transparent; border-color: #cbd5e1; color: #475569; }
    button.secondary:hover { background: #f8fafc; }
    button.success { background: #059669; border-color: #059669; }
    button.success:hover { background: #047857; }
    button.danger { background: #dc2626; border-color: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .table-wrap { overflow-x: auto; margin: 20px 0; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { background: #f8fafc; text-transform: uppercase; font-size: 11px; letter-spacing: 0.04em; color: #475569; font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: #f8fafc; }
    .uid-cell { font-family: monospace; font-size: 11px; color: #64748b; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .muted { color: #94a3b8; }
    .role-badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .role-badge.admin { background: #fee2e2; color: #b91c1c; }
    .role-badge.analyst { background: #dbeafe; color: #1e40af; }
    .role-badge.user { background: #e0e7ff; color: #3730a3; }
    .role-badge.viewer { background: #f3f4f6; color: #374151; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-small { padding: 6px 12px; font-size: 11px; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; border-radius: 12px; padding: 28px; max-width: 500px; width: 90%; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2); position: relative; }
    .modal-header { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #0f172a; }
    .modal-close { position: absolute; top: 12px; right: 12px; background: transparent; border: none; font-size: 28px; cursor: pointer; color: #94a3b8; padding: 0; width: 36px; height: 36px; }
    .modal-close:hover { color: #1e293b; }
    .modal-footer { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; color: #1e293b; font-size: 13px; }
    input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: inherit; font-size: 13px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1); }
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; display: none; font-size: 13px; }
    .alert.show { display: block; }
    .alert.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .alert.error { background: #fee2e2; color: #7f1d1d; border: 1px solid #fecaca; }
    .alert.info { background: #dbeafe; color: #0c2340; border: 1px solid #bfdbfe; }
  </style>
  <script src="firebase_config.js" onerror="console.warn('firebase_config.js not found')"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="wrap">
    <div class="auth-header">
      <div>
        <h1>🔐 Firebase Manager</h1>
        <p class="subtitle">Users & Roles Management</p>
      </div>
      <div class="auth-buttons">
        <div class="auth-info" id="userInfo" style="display: none;">
          <div class="user-avatar" id="userAvatar">U</div>
          <div>
            <p class="user-email" id="userEmail">user@example.com</p>
            <p class="user-role">Role: <span id="userRoleName">-</span></p>
          </div>
        </div>
        <button id="signOutBtn" class="secondary" style="display: none;" onclick="signOut()">Sign Out</button>
        <button id="signInBtn" class="success" onclick="openModal('signInModal')">Sign In</button>
      </div>
    </div>
    
    <div id="alert" class="alert"></div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('users-tab')">👥 Users</button>
      <button class="tab-btn" onclick="switchTab('roles-tab')">🎭 Roles</button>
    </div>

    <div id="users-tab" class="tab-content active">
      <div class="card">
        <div class="card-header">
          <div class="card-title">Registered Users</div>
          <div class="btn-group">
            <span id="status">Loading...</span>
            <button class="secondary" onclick="loadUsers()">↻ Reload</button>
            <button class="success" onclick="openModal('userModal')">+ New User</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Email</th>
                <th>UID</th>
                <th>Name</th>
                <th>Provider</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersBody">
              <tr><td class="muted" colspan="6">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="roles-tab" class="tab-content">
      <div class="card">
        <div class="card-header">
          <div class="card-title">User Roles</div>
          <div class="btn-group">
            <span id="roleStatus">Loading...</span>
            <button class="secondary" onclick="loadRoles()">↻ Reload</button>
            <button class="success" onclick="openModal('roleModal')">+ New Role</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Email</th>
                <th>Role</th>
                <th>Permissions</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="rolesBody">
              <tr><td class="muted" colspan="5">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="signInModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal('signInModal')">✕</button>
      <div class="modal-header">Sign In</div>
      <button class="success" onclick="signInWithGoogle()" style="margin-bottom: 16px;">🔵 Google Sign In</button>
      <div style="text-align: center; margin: 16px 0; color: #94a3b8;">OR</div>
      <form onsubmit="signInWithEmail(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signInEmail" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signInPassword" required>
        </div>
        <button type="submit" class="success">Sign In</button>
      </form>
    </div>
  </div>

  <div id="userModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal('userModal')">✕</button>
      <div class="modal-header">Create User</div>
      <form onsubmit="createUser(event)">
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="createUserEmail" required>
        </div>
        <div class="form-group">
          <label>Password *</label>
          <input type="password" id="createUserPassword" required minlength="6">
        </div>
        <div class="form-group">
          <label>Display Name</label>
          <input type="text" id="createUserName">
        </div>
        <div class="modal-footer">
          <button type="button" class="secondary" onclick="closeModal('userModal')">Cancel</button>
          <button type="submit" class="success">Create</button>
        </div>
      </form>
    </div>
  </div>

  <div id="roleModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal('roleModal')">✕</button>
      <div class="modal-header">Create Role</div>
      <form onsubmit="createRole(event)">
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="roleEmail" required>
        </div>
        <div class="form-group">
          <label>Role *</label>
          <select id="roleType" required>
            <option value="">-- Select --</option>
            <option value="admin">Admin</option>
            <option value="analyst">Analyst</option>
            <option value="user">User</option>
            <option value="viewer">Viewer</option>
          </select>
        </div>
        <div class="form-group">
          <label>Permissions</label>
          <textarea id="rolePerms" rows="2" placeholder="read, write, delete"></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="secondary" onclick="closeModal('roleModal')">Cancel</button>
          <button type="submit" class="success">Create</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    if (!window.AUTH_CONFIG) {
      window.AUTH_CONFIG = {
        FIREBASE_API_KEY: "AIzaSyDjhv-uj81Am43MXwRquinlRRoxBE9NGQA",
        FIREBASE_AUTH_DOMAIN: "gettingstartedwithfireba-efd5b.firebaseapp.com",
        FIREBASE_PROJECT_ID: "gettingstartedwithfireba-efd5b",
        FIREBASE_APP_ID: "1:617609354798:web:5f804b34cad0c5f388c9bf"
      };
    }

    const fbApp = firebase.initializeApp({
      apiKey: AUTH_CONFIG.FIREBASE_API_KEY,
      authDomain: AUTH_CONFIG.FIREBASE_AUTH_DOMAIN,
      projectId: AUTH_CONFIG.FIREBASE_PROJECT_ID,
      appId: AUTH_CONFIG.FIREBASE_APP_ID
    });
    const fbAuth = firebase.auth(fbApp);
    const db = firebase.firestore(fbApp);
    let currentUser = null;

    function showAlert(msg, type = 'info') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `alert show ${type}`;
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function switchTab(id) {
      document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      event.target.classList.add('active');
      if (id === 'users-tab') loadUsers();
      if (id === 'roles-tab') loadRoles();
    }

    async function signInWithGoogle() {
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const cred = await fbAuth.signInWithPopup(provider);
        const user = cred.user;
        const userRef = db.collection('users').doc(user.uid);
        const userDoc = await userRef.get();
        if (!userDoc.exists) {
          await userRef.set({
            email: user.email,
            displayName: user.displayName || user.email,
            photoURL: user.photoURL || '',
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            role: 'viewer',
            provider: 'google'
          });
          console.log('✅ Google user profile created');
          showAlert('Account created: ' + user.email, 'success');
        } else {
          showAlert('Welcome back: ' + user.email, 'info');
        }
        closeModal('signInModal');
        loadUsers();
      } catch (error) {
        showAlert('Error: ' + error.message, 'error');
      }
    }

    async function signInWithEmail(e) {
      e.preventDefault();
      const email = document.getElementById('signInEmail').value.trim();
      const password = document.getElementById('signInPassword').value;
      try {
        const cred = await fbAuth.signInWithEmailAndPassword(email, password);
        const user = cred.user;
        const userRef = db.collection('users').doc(user.uid);
        const userDoc = await userRef.get();
        if (!userDoc.exists) {
          await userRef.set({
            email: user.email,
            displayName: user.displayName || user.email,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            role: 'viewer',
            provider: 'email'
          });
          console.log('✅ Email user profile created');
        }
        showAlert('Signed in: ' + email, 'success');
        closeModal('signInModal');
        document.getElementById('signInEmail').value = '';
        document.getElementById('signInPassword').value = '';
        loadUsers();
      } catch (error) {
        showAlert('Error: ' + error.message, 'error');
      }
    }

    async function signOut() {
      try {
        await fbAuth.signOut();
        showAlert('Signed out', 'info');
      } catch (error) {
        showAlert('Error: ' + error.message, 'error');
      }
    }

    async function ensureCollections() {
      try {
        await db.collection('users').limit(1).get();
      } catch {
        await db.collection('users').doc('_init').set({setup: true});
        await db.collection('users').doc('_init').delete();
      }
      try {
        await db.collection('UserRole').limit(1).get();
      } catch {
        await db.collection('UserRole').doc('_init').set({setup: true});
        await db.collection('UserRole').doc('_init').delete();
      }
    }

    async function loadUserRole(email) {
      try {
        const snap = await db.collection('UserRole').where('email', '==', email).limit(1).get();
        if (!snap.empty) {
          const userRole = snap.docs[0].data().role;
          const roleDisplay = userRole.charAt(0).toUpperCase() + userRole.slice(1);
          document.getElementById('userRoleName').textContent = roleDisplay;
          console.log('✅ User role loaded:', userRole);
        } else {
          document.getElementById('userRoleName').textContent = 'No role assigned';
          console.log('⚠️ No role assigned in UserRole collection');
        }
      } catch (error) {
        console.error('Error loading user role:', error);
        document.getElementById('userRoleName').textContent = 'Error';
      }
    }

    async function loadUsers() {
      if (!currentUser) {
        document.getElementById('usersBody').innerHTML = '<tr><td class="muted" colspan="6">Sign in to view users</td></tr>';
        return;
      }
      try {
        const snap = await db.collection('users').get();
        const html = snap.empty 
          ? '<tr><td class="muted" colspan="6">No users. Click + New User</td></tr>'
          : snap.docs.map(doc => {
            const d = doc.data();
            const provider = d.provider || 'unknown';
            return `<tr><td>${d.email}</td><td><span class="uid-cell">${doc.id}</span></td><td>${d.displayName || '-'}</td><td>${provider}</td><td>${d.createdAt ? new Date(d.createdAt.toDate()).toLocaleDateString() : '-'}</td><td><button class="btn-small danger" onclick="deleteUser('${doc.id}', '${d.email}')">Delete</button></td></tr>`;
          }).join('');
        document.getElementById('usersBody').innerHTML = html;
        document.getElementById('status').className = 'success';
        document.getElementById('status').textContent = snap.size + ' user(s)';
      } catch (error) {
        showAlert('Error: ' + error.message, 'error');
      }
    }

    async function createUser(e) {
      e.preventDefault();
      const email = document.getElementById('createUserEmail').value.trim();
      const password = document.getElementById('createUserPassword').value.trim();
      const name = document.getElementById('createUserName').value.trim();
      if (!email || !password) {
        showAlert('Email and password required', 'error');
        return;
      }
      try {
        const cred = await fbAuth.createUserWithEmailAndPassword(email, password);
        await db.collection('users').doc(cred.user.uid).set({
          email,
          displayName: name || email,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          role: 'viewer',
          provider: 'email'
        });
        showAlert('User created: ' + email, 'success');
        closeModal('userModal');
        document.getElementById('userModal').querySelector('form').reset();
        loadUsers();
      } catch (error) {
        showAlert('Error: ' + error.message, 'error');
      }
    }

    async function deleteUser(uid, email) {
      if (!confirm('Delete ' + email + '?')) return;
      try {
        await db.collection('users').doc(uid).delete();
        showAlert('Deleted: ' + email, 'success');
        loadUsers();
      } catch (error) {
        showAlert('Error: ' + error.message, 'error');
      }
    }

    async function loadRoles() {
      if (!currentUser) {
        document.getElementById('rolesBody').innerHTML = '<tr><td class="muted" colspan="5">Sign in to view roles</td></tr>';
        return;
      }
      try {
        const snap = await db.collection('UserRole').get();
        const html = snap.empty
          ? '<tr><td class="muted" colspan="5">No roles. Click + New Role</td></tr>'
          : snap.docs.map(doc => {
            const d = doc.data();
            return `<tr><td>${d.email}</td><td><span class="role-badge ${d.role}">${d.role}</span></td><td>${Array.isArray(d.permissions) ? d.permissions.join(', ') : d.permissions || '-'}</td><td>${d.createdAt ? new Date(d.createdAt.toDate()).toLocaleDateString() : '-'}</td><td><button class="btn-small danger" onclick="deleteRole('${doc.id}', '${d.email}')">Delete</button></td></tr>`;
          }).join('');
        document.getElementById('rolesBody').innerHTML = html;
        document.getElementById('roleStatus').className = 'success';
        document.getElementById('roleStatus').textContent = snap.size + ' role(s)';
      } catch (error) {
        showAlert('Error: ' + error.message, 'error');
      }
    }

    async function createRole(e) {
      e.preventDefault();
      const email = document.getElementById('roleEmail').value.trim();
      const role = document.getElementById('roleType').value;
      const perms = document.getElementById('rolePerms').value.split(',').map(p => p.trim()).filter(p => p);
      try {
        const userSnap = await db.collection('users').where('email', '==', email).get();
        if (userSnap.empty) {
          showAlert('User not found', 'error');
          return;
        }
        const uid = userSnap.docs[0].id;
        await db.collection('UserRole').add({
          email, uid, role, permissions: perms,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showAlert('Role created: ' + email, 'success');
        closeModal('roleModal');
        document.getElementById('roleModal').querySelector('form').reset();
        loadRoles();
        if (currentUser.email === email) await loadUserRole(email);
      } catch (error) {
        showAlert('Error: ' + error.message, 'error');
      }
    }

    async function deleteRole(id, email) {
      if (!confirm('Delete role for ' + email + '?')) return;
      try {
        await db.collection('UserRole').doc(id).delete();
        showAlert('Deleted', 'success');
        loadRoles();
        if (currentUser.email === email) document.getElementById('userRoleName').textContent = 'No role assigned';
      } catch (error) {
        showAlert('Error: ' + error.message, 'error');
      }
    }

    fbAuth.onAuthStateChanged(async user => {
      currentUser = user;
      const userInfo = document.getElementById('userInfo');
      const signInBtn = document.getElementById('signInBtn');
      const signOutBtn = document.getElementById('signOutBtn');

      if (user) {
        document.getElementById('userAvatar').textContent = (user.email || 'U')[0].toUpperCase();
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('userRoleName').textContent = 'Loading...';
        userInfo.style.display = 'flex';
        signInBtn.style.display = 'none';
        signOutBtn.style.display = 'block';
        
        await ensureCollections();
        await loadUserRole(user.email);
        loadUsers();
      } else {
        userInfo.style.display = 'none';
        signInBtn.style.display = 'block';
        signOutBtn.style.display = 'none';
        document.getElementById('usersBody').innerHTML = '<tr><td class="muted" colspan="6">Sign in to view users</td></tr>';
        document.getElementById('rolesBody').innerHTML = '<tr><td class="muted" colspan="5">Sign in to view roles</td></tr>';
      }
    });
  </script>
</body>
</html>
